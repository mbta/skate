name: Deploy to Dev-blue (ECS)

on:
  workflow_dispatch:
    # This block is purposely empty.
  pull_request:
    types:
      - synchronize
      - labeled

# - https://docs.zizmor.sh/audits/#excessive-permissions
permissions:
  {} # Deliberately assign no default permissions.

jobs:
  deploy:
    permissions:
      id-token: write # Required to authenticate to AWS
      contents: read
    name: Deploy to Dev-blue (ECS)
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'deploy-to-dev-blue') }}
    uses: ./.github/workflows/deploy-base.yml
    with:
      env: dev-blue
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
