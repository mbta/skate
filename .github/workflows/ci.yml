name: Elixir and TypeScript CI

on: [push, pull_request]

jobs:
  setup:
    permissions:
      contents: read
    name: ASDF and Elixir dependencies
    runs-on: ubuntu-latest

    steps:
      # Git ref points to release tag 'v4'
      - uses: actions/checkout@b6849436894e144dbce29d7d7fda2ae3bf9d8365
        with:
          persist-credentials: false
      # cache the ASDF directory, using the values from .tool-versions
      - name: ASDF cache
        # Git ref points to release tag 'v4'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.asdf
          key: ${{ runner.os }}-asdf-${{ hashFiles('.tool-versions') }}
        id: asdf-cache
      # only run `asdf install` if we didn't hit the cache
      - if: steps.asdf-cache.outputs.cache-hit != 'true'
        # Git ref points to release tag 'v4'
        uses: asdf-vm/actions/install@156187456fbe441e7badfe93ec1fa4dda646b27e
      - name: Setup ASDF environment
        run: |
          ASDF_DIR=$HOME/.asdf
          echo "ASDF_DIR=$ASDF_DIR" >> $GITHUB_ENV
          echo "ASDF_DATA_DIR=$ASDF_DIR" >> $GITHUB_ENV
          echo "$ASDF_DIR/bin" >> $GITHUB_PATH
          echo "$ASDF_DIR/shims" >> $GITHUB_PATH
          $ASDF_DIR/bin/asdf reshim
      - name: Restore dependencies cache
        id: deps-cache
        # Git ref points to release tag 'v4'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix deps.get

  build_elixir:
    permissions:
      contents: read
    name: Build and test Elixir
    runs-on: ubuntu-latest
    needs: setup
    env:
      DATABASE_PASSWORD: postgres
      DATABASE_USER: postgres
      DATABASE_NAME: skate_test
      DATABASE_HOST: localhost
      GUARDIAN_SECRET_KEY: test_guardian_secret_keys
    services:
      postgres:
        image: postgres:18
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: ${{env.DATABASE_PASSWORD}}
          POSTGRES_USER: ${{env.DATABASE_USER}}
          POSTGRES_DB: ${{env.DATABASE_NAME}}
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      mosquitto:
        image: eclipse-mosquitto:2.0
        ports:
          - 1883:1883
        volumes:
          - ./mosquitto:/mosquitto/config/
        options: --name mqtt
    steps:
      # Git ref points to release tag 'v4'
      - uses: actions/checkout@b6849436894e144dbce29d7d7fda2ae3bf9d8365
        with:
          persist-credentials: false
      - name: Restart MQTT to load mosquitto/mosquitto.conf from checkout
        run: docker restart mqtt
      - name: ASDF cache
        # Git ref points to release tag 'v4'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.asdf
          key: ${{ runner.os }}-asdf-${{ hashFiles('.tool-versions') }}
        id: asdf-cache
      - name: Setup ASDF environment
        run: |
          ASDF_DIR=$HOME/.asdf
          echo "ASDF_DIR=$ASDF_DIR" >> $GITHUB_ENV
          echo "ASDF_DATA_DIR=$ASDF_DIR" >> $GITHUB_ENV
          echo "$ASDF_DIR/bin" >> $GITHUB_PATH
          echo "$ASDF_DIR/shims" >> $GITHUB_PATH
          $ASDF_DIR/bin/asdf reshim
      - name: Restore dependencies cache
        id: deps-cache
        # Git ref points to release tag 'v4'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Compile (warnings as errors)
        run: mix compile --force --warnings-as-errors
      - name: Check formatting
        run: mix format --check-formatted
      - name: Check migration safety
        run: mix excellent_migrations.check_safety
      - name: Credo
        run: mix credo
      - name: Sobelow
        run: mix sobelow
      - name: Run tests
        run: mix test --cover --include 'Test.Integration'
        env:
          POSTGRES_USERNAME: ${{env.DATABASE_USER}}
          POSTGRES_PASSWORD: ${{env.DATABASE_PASSWORD}}
          POSTGRES_HOSTNAME: ${{env.DATABASE_HOST}}
          GUARDIAN_SECRET_KEY: ${{env.GUARDIAN_SECRET_KEY}}
      # Git ref points to release tag 'v2'
      - uses: mbta/actions/dialyzer@6cff1d5eef7e0d780190353278bc84fdf6177dab

  build_typescript:
    permissions:
      contents: read
    name: Build and test TypeScript
    runs-on: ubuntu-latest
    needs: setup
    steps:
      # Git ref points to release tag 'v4'
      - uses: actions/checkout@b6849436894e144dbce29d7d7fda2ae3bf9d8365
        with:
          persist-credentials: false
      - name: ASDF cache
        # Git ref points to release tag 'v4'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.asdf
          key: ${{ runner.os }}-asdf-${{ hashFiles('.tool-versions') }}
        id: asdf-cache
      - name: Setup ASDF environment
        run: |
          ASDF_DIR=$HOME/.asdf
          echo "ASDF_DIR=$ASDF_DIR" >> $GITHUB_ENV
          echo "ASDF_DATA_DIR=$ASDF_DIR" >> $GITHUB_ENV
          echo "$ASDF_DIR/bin" >> $GITHUB_PATH
          echo "$ASDF_DIR/shims" >> $GITHUB_PATH
          $ASDF_DIR/bin/asdf reshim
      - name: Restore dependencies cache
        id: deps-cache
        # Git ref points to release tag 'v4'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        run: npm --prefix=assets ci 
      - name: Check types / linting / formatting
        run: npm --prefix=assets run check
      - name: Run tests
        run: npm --prefix=assets test -- --detectOpenHandles
