name: Build and Publish Storybook to GitHub Pages
 
on:
  push:
    branches:
      - 'main'
 
permissions:
  contents: read
  pages: write
  id-token: write
 
# List of jobs
jobs:
  setup:
    name: ASDF and Elixir dependencies
    runs-on: ubuntu-latest

    steps:
      # Git ref points to release tag 'v4'
      - uses: actions/checkout@b6849436894e144dbce29d7d7fda2ae3bf9d8365
      # cache the ASDF directory, using the values from .tool-versions
      - name: ASDF cache
        # Git ref points to release tag 'v4'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.asdf
          key: ${{ runner.os }}-asdf-${{ hashFiles('.tool-versions') }}
        id: asdf-cache
      # only run `asdf install` if we didn't hit the cache
      - if: steps.asdf-cache.outputs.cache-hit != 'true'
        # Git ref points to release tag 'v4'
        uses: asdf-vm/actions/install@156187456fbe441e7badfe93ec1fa4dda646b27e
      - name: Setup ASDF environment
        run: |
          ASDF_DIR=$HOME/.asdf
          echo "ASDF_DIR=$ASDF_DIR" >> $GITHUB_ENV
          echo "ASDF_DATA_DIR=$ASDF_DIR" >> $GITHUB_ENV
          echo "$ASDF_DIR/bin" >> $GITHUB_PATH
          echo "$ASDF_DIR/shims" >> $GITHUB_PATH
          $ASDF_DIR/bin/asdf reshim
      - name: Restore dependencies cache
        id: deps-cache
        # Git ref points to release tag 'v4'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix deps.get

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: setup
    steps:
      # Git ref points to release tag 'v4'
      - uses: actions/checkout@b6849436894e144dbce29d7d7fda2ae3bf9d8365
      - name: ASDF cache
        # Git ref points to release tag 'v4'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.asdf
          key: ${{ runner.os }}-asdf-${{ hashFiles('.tool-versions') }}
        id: asdf-cache
      - name: Setup ASDF environment
        run: |
          ASDF_DIR=$HOME/.asdf
          echo "ASDF_DIR=$ASDF_DIR" >> $GITHUB_ENV
          echo "ASDF_DATA_DIR=$ASDF_DIR" >> $GITHUB_ENV
          echo "$ASDF_DIR/bin" >> $GITHUB_PATH
          echo "$ASDF_DIR/shims" >> $GITHUB_PATH
          $ASDF_DIR/bin/asdf reshim
      - name: Restore dependencies cache
        id: deps-cache
        # Git ref points to release tag 'v4'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      # Git ref points to release tag 'v1.0.3'
      - uses: bitovi/github-actions-storybook-to-github-pages@b75ece8f984a32b2adb322065d7a8a2cc8db2d52
        with:
          install_command: npm --prefix assets ci # default: npm ci
          build_command: npm run --prefix assets build-storybook # default: npm run build-storybook
          path: assets/storybook-static # default: dist/storybook
          checkout: false # default: true


